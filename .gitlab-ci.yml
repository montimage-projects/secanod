# GitLab CI — mirrors .github/workflows/images.yml.
#
# Builds, smoke-tests and (on default branch / tags) publishes the MMT service
# images under images/*. The published image is multi-arch (linux/amd64 +
# linux/arm64) so `docker pull` works on both amd64 and arm64 hosts.
#
# This instance has only amd64 runners, so the arm64 image is built via QEMU
# emulation (buildx + binfmt) on the amd64 runner rather than on a native arm64
# runner. Emulated arm64 compilation is slow, so it runs only in the `publish`
# job (default branch / tags), not on every merge request.
#
# Adding a new service is a one-line change to the `.image_matrix` list below.

stages:
  - build
  - publish

variables:
  # docker-in-docker over TLS
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

.docker:
  image: docker:27-cli
  services:
    - docker:27-dind
  before_script:
    # bash + coreutils/findutils are needed by the smoke-test script
    - apk add --no-cache bash coreutils findutils

# One entry per service image — shared by the build and publish jobs.
.image_matrix:
  parallel:
    matrix:
      - IMAGE: [mmt-image]

# --- build + smoke test (native amd64) on branches, tags and merge requests ---
build_and_test:
  stage: build
  extends: [.docker, .image_matrix]
  script:
    - docker build -t "$IMAGE:ci" "images/$IMAGE"
    - |
      if [ -x "images/$IMAGE/tests/smoke-test.sh" ]; then
        IMAGE="$IMAGE:ci" bash "images/$IMAGE/tests/smoke-test.sh"
      else
        echo "No smoke-test.sh for $IMAGE, running --help only"
        docker run --rm "$IMAGE:ci" --help
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [images/**/*, .gitlab-ci.yml]
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'
      changes: [images/**/*, .gitlab-ci.yml]

# --- build multi-arch (amd64 native + arm64 via QEMU) and publish ------------
# Default branch & tags only (never on MRs). Builds both architectures with
# buildx and pushes a single multi-arch manifest to the GitLab registry.
publish:
  stage: publish
  extends: [.docker, .image_matrix]
  before_script:
    - apk add --no-cache bash coreutils findutils docker-cli-buildx
    # register QEMU emulators so this amd64 runner can build/run arm64
    - docker run --rm --privileged tonistiigi/binfmt --install arm64
    # a docker-container builder is required for multi-platform builds; it also
    # caches, so the arm64 layers built for the smoke test are reused on push
    - docker buildx create --use --driver docker-container --name mmtbuilder
  script:
    - |
      set -eu
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      IMG="$CI_REGISTRY_IMAGE/$IMAGE"

      # Validate the arm64 image under emulation before publishing: load the
      # single-arch arm64 build into the daemon and run the smoke test on it.
      docker buildx build --platform linux/arm64 --load -t "$IMAGE:ci-arm64" "images/$IMAGE"
      if [ -x "images/$IMAGE/tests/smoke-test.sh" ]; then
        IMAGE="$IMAGE:ci-arm64" bash "images/$IMAGE/tests/smoke-test.sh"
      fi

      # tags: always latest + short SHA; also the tag name on tag pipelines
      TAGS="-t $IMG:latest -t $IMG:$CI_COMMIT_SHORT_SHA"
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        TAGS="$TAGS -t $IMG:$CI_COMMIT_TAG"
      fi

      # build both arches (arm64 layers reused from cache) and push one manifest
      docker buildx build --platform linux/amd64,linux/arm64 $TAGS --push "images/$IMAGE"
      docker buildx imagetools inspect "$IMG:latest"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/**/*, .gitlab-ci.yml]
