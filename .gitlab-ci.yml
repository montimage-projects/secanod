# GitLab CI — mirrors .github/workflows/images.yml.
#
# Builds, smoke-tests and (on default branch / tags) publishes the MMT service
# images under images/*. Adding a new service is a one-line change to the
# parallel:matrix list.

stages:
  - build
  - publish

variables:
  # docker-in-docker over TLS
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

.docker:
  image: docker:27-cli
  services:
    - docker:27-dind
  before_script:
    # bash + coreutils/findutils are needed by the smoke-test script
    - apk add --no-cache bash coreutils findutils

# --- build + smoke test (runs on branches, tags and merge requests) ---
build_and_test:
  stage: build
  extends: .docker
  parallel:
    matrix:
      - IMAGE: mmt-image
  script:
    - docker build -t "$IMAGE:ci" "images/$IMAGE"
    - |
      if [ -x "images/$IMAGE/tests/smoke-test.sh" ]; then
        IMAGE="$IMAGE:ci" bash "images/$IMAGE/tests/smoke-test.sh"
      else
        echo "No smoke-test.sh for $IMAGE, running --help only"
        docker run --rm "$IMAGE:ci" --help
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [images/**/*, .gitlab-ci.yml]
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'
      changes: [images/**/*, .gitlab-ci.yml]

# --- publish to the GitLab Container Registry (default branch & tags only) ---
publish:
  stage: publish
  extends: .docker
  parallel:
    matrix:
      - IMAGE: mmt-image
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE/$IMAGE:latest" "images/$IMAGE"
    - |
      # tag as the commit SHA and, on a tag pipeline, the tag name
      docker tag "$CI_REGISTRY_IMAGE/$IMAGE:latest" "$CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_SHORT_SHA"
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE/$IMAGE:latest" "$CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_TAG"
      fi
      docker push --all-tags "$CI_REGISTRY_IMAGE/$IMAGE"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/**/*, .gitlab-ci.yml]
